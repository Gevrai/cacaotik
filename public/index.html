<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
  <title>Cacaotique — Controller</title>
  <link rel="stylesheet" href="/styles/index.css" />
</head>
<body>
  <div id="info">connecting…</div>
  <div id="dot"></div>

  <div class="dpad">
    <div class="btn empty"></div>
    <div class="btn" id="btn-up"   data-dir="up">▲</div>
    <div class="btn empty"></div>
    <div class="btn" id="btn-left" data-dir="left">◀</div>
    <div class="btn empty"></div>
    <div class="btn" id="btn-right" data-dir="right">▶</div>
    <div class="btn empty"></div>
    <div class="btn" id="btn-down"  data-dir="down">▼</div>
    <div class="btn empty"></div>
  </div>

  <div id="status">—</div>

  <script>
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    const ws = new WebSocket(`${proto}://${location.host}`);

    const infoEl = document.getElementById('info');
    const dotEl = document.getElementById('dot');
    const statusEl = document.getElementById('status');

    let myId = null;
    let myColor = null;

    ws.onopen = () => { statusEl.textContent = 'connected'; };
    ws.onclose = () => { statusEl.textContent = 'disconnected'; infoEl.textContent = 'lost connection'; };

    ws.onmessage = (e) => {
      const msg = JSON.parse(e.data);
      if (msg.type === 'init') {
        myId = msg.id;
        myColor = msg.color;
        infoEl.textContent = `Player ${myId}`;
        dotEl.style.background = myColor;
        statusEl.textContent = 'ready';
      }
    };

    function sendMove(dir) {
      if (ws.readyState !== 1) return;
      ws.send(JSON.stringify({ type: 'move', dir }));
    }

    // Button events — support both touch and mouse
    document.querySelectorAll('.btn[data-dir]').forEach(btn => {
      const dir = btn.dataset.dir;

      // Repeat interval while held
      let interval = null;

      function startMove() {
        sendMove(dir);
        btn.classList.add('pressed');
        interval = setInterval(() => sendMove(dir), 150);
      }
      function stopMove() {
        btn.classList.remove('pressed');
        clearInterval(interval);
        interval = null;
      }

      btn.addEventListener('touchstart', (e) => { e.preventDefault(); startMove(); });
      btn.addEventListener('touchend',   (e) => { e.preventDefault(); stopMove(); });
      btn.addEventListener('mousedown',  startMove);
      btn.addEventListener('mouseup',    stopMove);
      btn.addEventListener('mouseleave', stopMove);
    });
  </script>
</body>
</html>
