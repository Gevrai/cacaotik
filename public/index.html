<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
  <title>Cacaotique — Controller</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      color: #fff;
      font-family: monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100svh;
      gap: 24px;
      touch-action: none;
      user-select: none;
    }
    #info {
      font-size: 18px;
      letter-spacing: 1px;
    }
    #dot {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: #555;
      border: 3px solid #fff;
      margin: 0 auto;
    }
    .dpad {
      display: grid;
      grid-template-columns: repeat(3, 72px);
      grid-template-rows: repeat(3, 72px);
      gap: 6px;
    }
    .btn {
      background: #2a2a4a;
      border: 2px solid #555;
      border-radius: 12px;
      color: #fff;
      font-size: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:active, .btn.pressed {
      background: #4a4a8a;
      border-color: #aaa;
    }
    .btn.empty { background: transparent; border: none; pointer-events: none; }
    #status { font-size: 13px; color: #888; }
  </style>
</head>
<body>
  <div id="info">connecting…</div>
  <div id="dot"></div>

  <div class="dpad">
    <div class="btn empty"></div>
    <div class="btn" id="btn-up"   data-dir="up">▲</div>
    <div class="btn empty"></div>
    <div class="btn" id="btn-left" data-dir="left">◀</div>
    <div class="btn empty"></div>
    <div class="btn" id="btn-right" data-dir="right">▶</div>
    <div class="btn empty"></div>
    <div class="btn" id="btn-down"  data-dir="down">▼</div>
    <div class="btn empty"></div>
  </div>

  <div id="status">—</div>

  <script>
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    const ws = new WebSocket(`${proto}://${location.host}`);

    const infoEl = document.getElementById('info');
    const dotEl = document.getElementById('dot');
    const statusEl = document.getElementById('status');

    let myId = null;
    let myColor = null;

    ws.onopen = () => { statusEl.textContent = 'connected'; };
    ws.onclose = () => { statusEl.textContent = 'disconnected'; infoEl.textContent = 'lost connection'; };

    ws.onmessage = (e) => {
      const msg = JSON.parse(e.data);
      if (msg.type === 'init') {
        myId = msg.id;
        myColor = msg.color;
        infoEl.textContent = `Player ${myId}`;
        dotEl.style.background = myColor;
        statusEl.textContent = 'ready';
      }
    };

    function sendMove(dir) {
      if (ws.readyState !== 1) return;
      ws.send(JSON.stringify({ type: 'move', dir }));
    }

    // Button events — support both touch and mouse
    document.querySelectorAll('.btn[data-dir]').forEach(btn => {
      const dir = btn.dataset.dir;

      // Repeat interval while held
      let interval = null;

      function startMove() {
        sendMove(dir);
        btn.classList.add('pressed');
        interval = setInterval(() => sendMove(dir), 150);
      }
      function stopMove() {
        btn.classList.remove('pressed');
        clearInterval(interval);
        interval = null;
      }

      btn.addEventListener('touchstart', (e) => { e.preventDefault(); startMove(); });
      btn.addEventListener('touchend',   (e) => { e.preventDefault(); stopMove(); });
      btn.addEventListener('mousedown',  startMove);
      btn.addEventListener('mouseup',    stopMove);
      btn.addEventListener('mouseleave', stopMove);
    });
  </script>
</body>
</html>
