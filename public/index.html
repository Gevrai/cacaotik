<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
  <title>Cacaotique — Controller</title>
  <link rel="icon" type="image/png" href="/assets/characters/lapin/lapin_sit.png" />
  <link rel="stylesheet" href="/styles/index.css" />
</head>
<body>
  <div id="lobby">
    <h1 id="lobby-title">Cacaotique</h1>

    <label for="name-input" class="lobby-label">Ton nom</label>
    <input id="name-input" type="text" maxlength="16" placeholder="Entrer un nom…" autocomplete="off" autocorrect="off" spellcheck="false" />
    <p id="lobby-error" style="color:#e74c3c;display:none;margin:4px 0 0;font-size:0.9em;"></p>

    <p class="lobby-label">Choisis ton personnage</p>
    <div id="character-grid">
      <button class="char-btn" data-char="red">
        <div class="char-sprite" style="background-image: url('/assets/characters/players/red.png')"></div>
        <span>Rouge</span>
      </button>
      <button class="char-btn" data-char="blue">
        <div class="char-sprite" style="background-image: url('/assets/characters/players/blue.png')"></div>
        <span>Bleu</span>
      </button>
      <button class="char-btn" data-char="white">
        <div class="char-sprite" style="background-image: url('/assets/characters/players/white.png')"></div>
        <span>Blanc</span>
      </button>
      <button class="char-btn" data-char="yellow">
        <div class="char-sprite" style="background-image: url('/assets/characters/players/yellow.png')"></div>
        <span>Jaune</span>
      </button>
    </div>

    <button id="btn-enter" disabled>Rejoindre</button>
  </div>

  <div id="game">
    <div id="info">connecting…</div>

    <div id="action-card">
      <div id="player-inventory">
        <div class="inventory-bubble">
          <img id="player-water-icon" class="inventory-icon" src="/assets/tiles/tile_0164_sceau_vide.png" alt="Eau" />
          <span id="player-water" class="inventory-value">0</span>
          <span class="inventory-type">Eau</span>
        </div>
        <div class="inventory-bubble">
          <img class="inventory-icon" src="/assets/tiles/tile_0162_sacSeeds.png" alt="Graines" />
          <span id="player-seeds" class="inventory-value">0</span>
          <span class="inventory-type">Graines</span>
        </div>
        <div class="inventory-bubble">
          <img class="inventory-icon" src="/assets/tiles/tile_0163_cacaoFeve.png" alt="Cacao" />
          <span id="player-cacao" class="inventory-value">0</span>
          <span class="inventory-type">Cacao</span>
        </div>
      </div>
      <div id="action-role">En attente d'action…</div>
      <div id="action-timer">—</div>
      <div id="action-progress" aria-hidden="true">
        <div id="action-progress-fill"></div>
      </div>
      <div id="action-buttons">
        <button class="action-btn" data-action="plant_seed" type="button">Planter une graine</button>
        <button class="action-btn" data-action="fetch_seed" type="button">Transformer 1 cacao en 3 graines</button>
        <button class="action-btn" data-action="fetch_water" type="button">Prendre de l'eau</button>
        <button class="action-btn" data-action="water_plants" type="button">Arroser</button>
        <button class="action-btn" data-action="talk_bees" type="button">Parler aux abeilles</button>
        <button class="action-btn" data-action="harvest_cacao" type="button">Récolter le cacao</button>
        <button class="action-btn" data-action="burn_tree" type="button">Mettre le feu</button>
        <button class="action-btn" data-action="pet_llama" type="button">Papouiller le lama</button>
        <button class="action-btn" data-action="feed_rabbit" type="button">Nourrir le lapin</button>
        <button class="action-btn" data-action="harvest_choco" type="button">Récolter le caca en chocolat</button>
        <button class="action-btn" data-action="buy_happiness" type="button">Acheter le bonheur</button>
        <button class="action-btn" data-action="greet_player" type="button">Saluer</button>
      </div>
      <div id="player-money-item" style="display: none;">
        <span class="inventory-money-icon">$</span>
        <span id="player-money">Argent: 0$</span>
      </div>
    </div>

    <div id="joystick" aria-label="movement joystick">
      <div id="joystick-base">
        <div id="joystick-stick"></div>
      </div>
    </div>

    <div id="status">—</div>
  </div>

  <script>
    const lobbyEl = document.getElementById('lobby');
    const gameEl = document.getElementById('game');
    const nameInputEl = document.getElementById('name-input');
    const lobbyErrorEl = document.getElementById('lobby-error');
    const charBtns = document.querySelectorAll('.char-btn');
    const btnEnterEl = document.getElementById('btn-enter');

    let selectedChar = null;
    let gameStarted = false;

    function showLobbyError(message) {
      lobbyErrorEl.textContent = message;
      lobbyErrorEl.style.display = 'block';
    }

    function clearLobbyError() {
      lobbyErrorEl.style.display = 'none';
    }

    const savedName = localStorage.getItem('cacao_name');
    const savedChar = localStorage.getItem('cacao_char');
    if (savedName) nameInputEl.value = savedName;

    function selectChar(char) {
      charBtns.forEach(button => button.classList.toggle('selected', button.dataset.char === char));
      selectedChar = char;
      updateEnterBtn();
    }

    function updateEnterBtn() {
      btnEnterEl.disabled = !(nameInputEl.value.trim().length > 0 && selectedChar);
    }

    charBtns.forEach(button => {
      button.addEventListener('click', () => selectChar(button.dataset.char));
    });

    if (savedChar) selectChar(savedChar);
    nameInputEl.addEventListener('input', updateEnterBtn);

    function launchGame(name, character) {
      if (gameStarted) return;
      gameStarted = true;
      clearLobbyError();
      lobbyEl.style.display = 'none';
      gameEl.style.display = 'flex';
      startGame(name, character);
    }

    function returnToLobby(errorMessage) {
      gameStarted = false;
      gameEl.style.display = 'none';
      lobbyEl.style.display = '';
      if (errorMessage) showLobbyError(errorMessage);
      btnEnterEl.disabled = false;
    }

    nameInputEl.addEventListener('input', clearLobbyError);

    btnEnterEl.addEventListener('click', () => {
      const name = nameInputEl.value.trim() || 'Joueur';
      localStorage.setItem('cacao_name', name);
      localStorage.setItem('cacao_char', selectedChar);
      launchGame(name, selectedChar);
    });

    const infoEl = document.getElementById('info');
    const statusEl = document.getElementById('status');
    const joystickEl = document.getElementById('joystick');
    const joystickBaseEl = document.getElementById('joystick-base');
    const joystickStickEl = document.getElementById('joystick-stick');
    const actionRoleEl = document.getElementById('action-role');
    const actionBtnEls = document.querySelectorAll('.action-btn');
    const actionTimerEl = document.getElementById('action-timer');
    const actionProgressEl = document.getElementById('action-progress');
    const actionProgressFillEl = document.getElementById('action-progress-fill');
    const playerWaterIconEl = document.getElementById('player-water-icon');
    const playerWaterEl = document.getElementById('player-water');
    const playerSeedsEl = document.getElementById('player-seeds');
    const playerCacaoEl = document.getElementById('player-cacao');
    const playerMoneyItemEl = document.getElementById('player-money-item');
    const playerMoneyEl = document.getElementById('player-money');

    const WATER_ICON_EMPTY = '/assets/tiles/tile_0164_sceau_vide.png';
    const WATER_ICON_FULL = '/assets/tiles/tile_0164_sceau_plein.png';

    actionBtnEls.forEach(button => {
      button.dataset.baseLabel = button.textContent.trim();
    });

    let myId = null;
    let activeAction = null;
    let actionsByKey = {};

    const sounds = {
      bees: new Audio('/assets/ost/Bees.mp3'),
      success: new Audio('/assets/ost/Success.mp3'),
    };

    function playSound(key) {
      const snd = sounds[key];
      if (!snd) return;
      snd.currentTime = 0;
      snd.play().catch(() => {});
    }

    function updateMyActionFromSnapshot() {
      if (!myId) return;
      const myActions = actionsByKey;
      activeAction = myActions.activeAction || null;
    }

    function getActionFromKey(actionKey) {
      return actionsByKey[actionKey] || null;
    }

    function updateWaterInventory(hasWater) {
      playerWaterEl.textContent = hasWater ? '1' : '0';
      playerWaterIconEl.src = hasWater ? WATER_ICON_FULL : WATER_ICON_EMPTY;
    }

    function updateSeedsInventory(seeds) {
      playerSeedsEl.textContent = `${seeds}`;
    }

    function updateCacaoInventory(cacao) {
      playerCacaoEl.textContent = `${cacao}`;
    }

    function updateMoneyInventory(money) {
      playerMoneyEl.textContent = `Argent: ${money}$`;
      playerMoneyItemEl.style.display = money > 0 ? 'flex' : 'none';
    }

    function setActionButtonContent(button, label, reason = null) {
      button.textContent = '';

      const labelEl = document.createElement('span');
      labelEl.className = 'action-label';
      labelEl.textContent = label;
      button.appendChild(labelEl);

      if (reason) {
        const reasonEl = document.createElement('span');
        reasonEl.className = 'action-reason';
        reasonEl.textContent = reason;
        button.appendChild(reasonEl);
      }
    }

    function renderActionButtons() {
      for (const button of actionBtnEls) {
        const actionKey = button.dataset.action;
        const action = getActionFromKey(actionKey);
        const isVisible = Boolean(action && action.isVisible !== false);
        button.style.display = isVisible ? '' : 'none';
        const baseLabel = button.dataset.baseLabel || button.textContent.trim();
        if (!isVisible) {
          setActionButtonContent(button, baseLabel);
          continue;
        }

        const blockedByContext = Boolean(action && !action.canInteract && action.blockedReason);
        setActionButtonContent(button, baseLabel, blockedByContext ? action.blockedReason : null);
        if (!isVisible) continue;
        const canUse = Boolean(action && action.canInteract && !activeAction);
        button.disabled = !canUse;
        button.title = blockedByContext ? action.blockedReason : '';
      }
    }

    function renderAction() {
      renderActionButtons();

      if (!activeAction) {
        const visibleActions = Object.values(actionsByKey).filter(action => (
          action
          && typeof action === 'object'
          && action.key
          && action.isVisible !== false
        ));
        const blockedReason = visibleActions.find(action => action.blockedReason)?.blockedReason;
        actionRoleEl.textContent = blockedReason || (visibleActions.length > 0 ? 'Choisis une action' : 'Aucune action ici');
        actionTimerEl.textContent = '—';
        actionProgressEl.classList.remove('visible');
        actionProgressFillEl.style.width = '0%';
        return;
      }

      actionRoleEl.textContent = `Action en cours: ${activeAction.title}`;

      if (activeAction.status === 'in_progress' && activeAction.startedAt) {
        const elapsed = Date.now() - activeAction.startedAt;
        const remainingMs = Math.max(0, activeAction.durationMs - elapsed);
        actionTimerEl.textContent = `Timer: ${(remainingMs / 1000).toFixed(1)}s`;

        const progress = Math.max(0, Math.min(1, elapsed / activeAction.durationMs));
        actionProgressEl.classList.add('visible');
        actionProgressFillEl.style.width = `${(progress * 100).toFixed(1)}%`;
      } else {
        actionTimerEl.textContent = '—';
        actionProgressEl.classList.remove('visible');
        actionProgressFillEl.style.width = '0%';
      }
    }

    function startGame(name, character) {
      // Stable ID stored in localStorage so server can restore our slot after reconnect
      let reconnectId = localStorage.getItem('cacaotik_reconnect_id');
      if (!reconnectId) {
        reconnectId = Math.random().toString(36).slice(2) + Date.now().toString(36);
        localStorage.setItem('cacaotik_reconnect_id', reconnectId);
      }

      let ws = null;

      function connect() {
        const proto = location.protocol === 'https:' ? 'wss' : 'ws';
        ws = new WebSocket(`${proto}://${location.host}`);

        ws.onopen = () => {
          statusEl.textContent = 'connected';
          ws.send(JSON.stringify({ type: 'join', name, character, reconnectId }));
        };

        ws.onclose = () => {
          // Don't auto-reconnect if we were rejected — returnToLobby already called
          if (!gameStarted) return;
          statusEl.textContent = 'reconnexion...';
          setTimeout(connect, 3000);
        };

        ws.onmessage = onMessage;
      }

      connect();

      function onMessage(event) {
        const msg = JSON.parse(event.data);

        if (msg.type === 'join_rejected') {
          ws.close();
          returnToLobby(msg.message);
          return;
        }

        if (msg.type === 'init') {
          myId = msg.id;
          infoEl.textContent = msg.name || `Joueur ${myId}`;
          statusEl.textContent = 'prêt';
          updateMyActionFromSnapshot();
          renderAction();
        }

        if (msg.type === 'action_update') {
          const myActions = (msg.actionsByPlayer && myId)
            ? (msg.actionsByPlayer[myId] || msg.actionsByPlayer[String(myId)] || {})
            : {};
          actionsByKey = myActions;
          if (msg.hasWaterByPlayer) {
            const hasWater = msg.hasWaterByPlayer[myId] ?? msg.hasWaterByPlayer[String(myId)];
            if (typeof hasWater === 'boolean') {
              updateWaterInventory(hasWater);
            }
          }
          if (msg.seedsByPlayer) {
            const seeds = msg.seedsByPlayer[myId] ?? msg.seedsByPlayer[String(myId)];
            if (typeof seeds === 'number') {
              updateSeedsInventory(seeds);
            }
          }
          if (msg.cacaoByPlayer) {
            const cacao = msg.cacaoByPlayer[myId] ?? msg.cacaoByPlayer[String(myId)];
            if (typeof cacao === 'number') {
              updateCacaoInventory(cacao);
            }
          }
          if (msg.moneyByPlayer) {
            const money = msg.moneyByPlayer[myId] ?? msg.moneyByPlayer[String(myId)];
            if (typeof money === 'number') {
              updateMoneyInventory(money);
            }
          }
          updateMyActionFromSnapshot();
          renderAction();
        }

        if (msg.type === 'action_result') {
          if (msg.sfxFile && Array.isArray(msg.sfxTargetIds) && msg.sfxTargetIds.includes(myId)) {
            new Audio(msg.sfxFile).play().catch(() => {});
            if (msg.sfxExtraFile) new Audio(msg.sfxExtraFile).play().catch(() => {});
          }
          if (!msg.playerId || msg.playerId === myId) {
            if (msg.success && msg.actionKey === 'harvest_cacao') playSound('success');
            statusEl.textContent = msg.message || 'action update';
            if (typeof msg.hasWater === 'boolean') {
              updateWaterInventory(msg.hasWater);
            }
            if (typeof msg.seeds === 'number') {
              updateSeedsInventory(msg.seeds);
            }
            if (typeof msg.cacao === 'number') {
              updateCacaoInventory(msg.cacao);
            }
            if (typeof msg.money === 'number') {
              updateMoneyInventory(msg.money);
            }
          }
        }
      }

      function sendMove(dir) {
        if (ws.readyState !== 1) return;
        ws.send(JSON.stringify({ type: 'move', dir }));
      }

      function sendStop() {
        if (ws.readyState !== 1) return;
        ws.send(JSON.stringify({ type: 'stop' }));
      }

      function sendInteract(actionKey) {
        if (ws.readyState !== 1) return;
        ws.send(JSON.stringify({ type: 'interact', key: actionKey }));
      }

      const DEAD_ZONE = 18;
      const MAX_RADIUS = 70;
      const SNAP_RADIUS = 64;

      let pointerId = null;
      let activeDir = null;

      function setStickPosition(x, y) {
        joystickStickEl.style.transform = `translate(${x}px, ${y}px)`;
      }

      function resetJoystick() {
        if (activeDir !== null) {
          activeDir = null;
          sendStop();
        }
        setStickPosition(0, 0);
        joystickBaseEl.classList.remove('active');
      }

      function vectorToDirection(dx, dy) {
        const angle = Math.atan2(dy, dx) * (180 / Math.PI);

        if (angle >= -22.5 && angle < 22.5) return 'right';
        if (angle >= 22.5 && angle < 67.5) return 'down-right';
        if (angle >= 67.5 && angle < 112.5) return 'down';
        if (angle >= 112.5 && angle < 157.5) return 'down-left';
        if (angle >= 157.5 || angle < -157.5) return 'left';
        if (angle >= -157.5 && angle < -112.5) return 'up-left';
        if (angle >= -112.5 && angle < -67.5) return 'up';
        return 'up-right';
      }

      function updateFromPointer(clientX, clientY) {
        const rect = joystickBaseEl.getBoundingClientRect();
        const centerX = rect.left + rect.width / 2;
        const centerY = rect.top + rect.height / 2;

        let dx = clientX - centerX;
        let dy = clientY - centerY;

        const distance = Math.hypot(dx, dy);
        if (distance > MAX_RADIUS) {
          const scale = MAX_RADIUS / distance;
          dx *= scale;
          dy *= scale;
        }

        if (distance < DEAD_ZONE) {
          if (activeDir !== null) {
            activeDir = null;
            sendStop();
          }
          setStickPosition(0, 0);
          return;
        }

        const angle = Math.atan2(dy, dx);
        const snappedAngle = Math.round(angle / (Math.PI / 4)) * (Math.PI / 4);
        const snappedX = Math.cos(snappedAngle) * SNAP_RADIUS;
        const snappedY = Math.sin(snappedAngle) * SNAP_RADIUS;
        setStickPosition(snappedX, snappedY);

        const newDir = vectorToDirection(dx, dy);
        if (newDir !== activeDir) {
          activeDir = newDir;
          sendMove(activeDir);
        }
      }

      joystickEl.addEventListener('pointerdown', (event) => {
        event.preventDefault();
        pointerId = event.pointerId;
        joystickBaseEl.classList.add('active');
        joystickEl.setPointerCapture(pointerId);
        updateFromPointer(event.clientX, event.clientY);
      });

      joystickEl.addEventListener('pointermove', (event) => {
        if (event.pointerId !== pointerId) return;
        event.preventDefault();
        updateFromPointer(event.clientX, event.clientY);
      });

      function stopPointer(event) {
        if (event.pointerId !== pointerId) return;
        if (joystickEl.hasPointerCapture(pointerId)) {
          joystickEl.releasePointerCapture(pointerId);
        }
        pointerId = null;
        resetJoystick();
      }

      joystickEl.addEventListener('pointerup', stopPointer);
      joystickEl.addEventListener('pointercancel', stopPointer);
      joystickEl.addEventListener('pointerleave', (event) => {
        if (event.pointerId !== pointerId) return;
        resetJoystick();
      });

      actionBtnEls.forEach(button => {
        button.addEventListener('click', () => {
          const actionKey = button.dataset.action;
          if (actionKey === 'talk_bees') playSound('bees');
          sendInteract(actionKey);
        });
      });

      setInterval(() => {
        if (activeAction && activeAction.status === 'in_progress') {
          renderAction();
        }
      }, 100);

      resetJoystick();
      renderAction();
    }

    if (savedName && savedChar) {
      launchGame(savedName, savedChar);
    }
  </script>
</body>
</html>
