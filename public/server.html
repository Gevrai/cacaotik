<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Cacaotique — Display</title>
  <link rel="stylesheet" href="/styles/server.css" />
</head>
<body>
  <div id="status">connecting…</div>
  <div id="game"></div>
  <div id="connect-panel">
    <img id="connect-qr" alt="QR code to connect controllers" />
    <div id="connect-url">loading…</div>
  </div>
  <audio id="ost" src="/assets/ost/CacaoTown.mp3" loop preload="auto"></audio>
  <script src="/phaser/phaser.min.js"></script>
  <script>
    // Start OST on first user interaction (browser autoplay policy)
    (function () {
      const ost = document.getElementById('ost');
      function tryPlay() {
        ost.play().catch(() => {});
        window.removeEventListener('click', tryPlay);
        window.removeEventListener('keydown', tryPlay);
      }
      ost.play().catch(() => {
        window.addEventListener('click', tryPlay);
        window.addEventListener('keydown', tryPlay);
      });
    })();
  </script>
  <script>
    // ── Shared state (updated by WebSocket, read by Phaser scene) ──────────
    let players = {};
    let mapCacheBust = Date.now();
    const statusEl = document.getElementById('status');

    // ── Phaser scene ────────────────────────────────────────────────────────
    class GameScene extends Phaser.Scene {
      constructor() { super({ key: 'GameScene' }); }

      init() {
        // Called before preload on every (re)start — capture current cache bust
        this._mapUrl = '/assets/basemap2.tmj?t=' + mapCacheBust;
      }

      preload() {
        // Remove stale cached map so Phaser re-fetches from disk
        if (this.cache.tilemap.has('map')) this.cache.tilemap.remove('map');

        this.load.tilemapTiledJSON('map', this._mapUrl);
        this.load.image('tilemap_packed', '/assets/tilemap_packed.png?t=' + mapCacheBust);

        // Character spritesheets — 96×24px, 4 frames of 24×24
        const t = mapCacheBust;
        this.load.spritesheet('char_red',    `/assets/characters/players/red.png?t=${t}`,    { frameWidth: 24, frameHeight: 24 });
        this.load.spritesheet('char_blue',   `/assets/characters/players/blue.png?t=${t}`,   { frameWidth: 24, frameHeight: 24 });
        this.load.spritesheet('char_yellow', `/assets/characters/players/yellow.png?t=${t}`, { frameWidth: 24, frameHeight: 24 });
        this.load.spritesheet('char_white',  `/assets/characters/players/white.png?t=${t}`,  { frameWidth: 24, frameHeight: 24 });
      }

      create() {
        // ── Tilemap ──────────────────────────────────────────────────────────
        const map = this.make.tilemap({ key: 'map' });

        if (!map) {
          console.warn('[GameScene] map.tmj not found — rendering placeholder grid');
          this._drawFallbackGrid();
          this._defineCharAnims();
          this._setupPlayers();
          return;
        }

        // Try to add each tileset by its Tiled "Name"; fallback to shared texture key
        const resolvedTilesets = [];
        for (const ts of map.tilesets) {
          const key = ts.name;
          if (this.textures.exists(key)) {
            const resolved = map.addTilesetImage(ts.name, key);
            if (resolved) resolvedTilesets.push(resolved);
            continue;
          }

          if (this.textures.exists('tilemap_packed')) {
            const resolved = map.addTilesetImage(ts.name, 'tilemap_packed');
            if (resolved) resolvedTilesets.push(resolved);
            continue;
          }

          console.warn(`[GameScene] texture "${key}" not preloaded — skipping`);
        }

        if (resolvedTilesets.length === 0) {
          console.warn('[GameScene] no tileset resolved — rendering fallback grid');
          this._drawFallbackGrid();
          this._setupPlayers();
          return;
        }

        // Render all tile layers in order
        const layerNames = map.layers.map(l => l.name);
        console.log('[GameScene] layers found:', layerNames);

        let createdLayerCount = 0;

        for (const name of layerNames) {
          try {
            const layer = map.createLayer(name, resolvedTilesets, 0, 0);
            if (layer) createdLayerCount += 1;
          } catch (e) {
            console.warn(`[GameScene] could not create layer "${name}":`, e.message);
          }
        }

        if (createdLayerCount === 0) {
          console.warn('[GameScene] no tile layer created — rendering fallback grid');
          this._drawFallbackGrid();
          this._defineCharAnims();
          this._setupPlayers();
          return;
        }

        // Fit camera to map
        this.fitMapToViewport(map.widthInPixels, map.heightInPixels);
        this.scale.on('resize', () => {
          this.fitMapToViewport(map.widthInPixels, map.heightInPixels);
        });

        this._defineCharAnims();
        this._setupPlayers();
      }

      fitMapToViewport(mapWidth, mapHeight) {
        const cam = this.cameras.main;
        const padding = 24; // border inset in pixels
        const zoomX = (cam.width - padding * 2) / mapWidth;
        const zoomY = (cam.height - padding * 2) / mapHeight;
        cam.setZoom(Math.min(zoomX, zoomY));
        cam.centerOn(mapWidth / 2, mapHeight / 2);
      }

      _drawFallbackGrid() {
        const GRID_SIZE = 16, COLS = 30, ROWS = 20;
        const g = this.add.graphics();
        g.lineStyle(1, 0x2a2a4a, 1);
        for (let x = 0; x <= COLS; x++) {
          g.lineBetween(x * GRID_SIZE, 0, x * GRID_SIZE, ROWS * GRID_SIZE);
        }
        for (let y = 0; y <= ROWS; y++) {
          g.lineBetween(0, y * GRID_SIZE, COLS * GRID_SIZE, y * GRID_SIZE);
        }
      }

      // Maps server color hex → spritesheet key
      _colorToSpriteKey(color) {
        const map = {
          '#e74c3c': 'char_red',
          '#3498db': 'char_blue',
          '#ffffff': 'char_white',
          '#f1c40f': 'char_yellow',
        };
        return map[color] || 'char_red';
      }

      _defineCharAnims() {
        const COLORS = ['red', 'blue', 'yellow', 'white'];
        for (const c of COLORS) {
          const key = `char_${c}`;
          if (!this.anims.exists(`idle_${c}`)) {
            this.anims.create({
              key: `idle_${c}`,
              frames: this.anims.generateFrameNumbers(key, { start: 0, end: 1 }),
              frameRate: 4,
              repeat: -1,
            });
          }
          if (!this.anims.exists(`run_${c}`)) {
            this.anims.create({
              key: `run_${c}`,
              frames: this.anims.generateFrameNumbers(key, { start: 2, end: 3 }),
              frameRate: 8,
              repeat: -1,
            });
          }
        }
      }

      _setupPlayers() {
        this._sprites = {};  // id → Phaser.GameObjects.Sprite
        this._local = {};    // id → { x, y } — client-extrapolated pixel positions (display scale)
      }

      update(time, delta) {
        if (!this._sprites) return;
        const DISPLAY_GRID = 16; // display tile size
        const SCALE = DISPLAY_GRID / 32; // server uses 32px grid
        const dt = delta / 1000; // seconds
        const CORRECTION = 0.2; // per-frame lerp strength toward server truth

        const activeIds = new Set(Object.keys(players));

        for (const p of Object.values(players)) {
          const spriteKey = this._colorToSpriteKey(p.color);
          const colorName = spriteKey.replace('char_', '');

          // Server authoritative position in display pixels
          const sx = p.x * SCALE;
          const sy = p.y * SCALE;

          // Create sprite on first appearance
          if (!this._sprites[p.id]) {
            const spr = this.add.sprite(sx, sy, spriteKey);
            spr.setScale(DISPLAY_GRID / 24);
            spr.play(`idle_${colorName}`);
            this._sprites[p.id] = spr;
            this._local[p.id] = { x: sx, y: sy };
          }

          const spr = this._sprites[p.id];
          const loc = this._local[p.id];

          const prevX = loc.x;

          // Extrapolate using server velocity
          loc.x += (p.vx || 0) * SCALE * dt;
          loc.y += (p.vy || 0) * SCALE * dt;

          // Gently correct toward server position to prevent drift
          loc.x += (sx - loc.x) * CORRECTION;
          loc.y += (sy - loc.y) * CORRECTION;

          const moving = (p.vx !== 0 || p.vy !== 0);

          // Flip horizontally based on horizontal velocity
          if ((p.vx || 0) < 0) spr.setFlipX(true);
          else if ((p.vx || 0) > 0) spr.setFlipX(false);

          const targetAnim = moving ? `run_${colorName}` : `idle_${colorName}`;
          if (spr.anims.currentAnim?.key !== targetAnim) spr.play(targetAnim);

          spr.setPosition(loc.x, loc.y);
        }

        // Remove sprites for disconnected players
        for (const id of Object.keys(this._sprites)) {
          if (!activeIds.has(id)) {
            this._sprites[id].destroy();
            delete this._sprites[id];
            delete this._local[id];
          }
        }
      }
    }

    // ── Phaser config ───────────────────────────────────────────────────────
    const config = {
      type: Phaser.AUTO,
      width: window.innerWidth,
      height: window.innerHeight,
      backgroundColor: '#1a1a2e',
      pixelArt: true,
      scene: [GameScene],
      parent: 'game',
      scale: {
        mode: Phaser.Scale.RESIZE,
        autoCenter: Phaser.Scale.CENTER_BOTH,
      },
    };

    const game = new Phaser.Game(config);

    // ── WebSocket ───────────────────────────────────────────────────────────
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    const ws = new WebSocket(`${proto}://${location.host}`);
    const connectQrEl = document.getElementById('connect-qr');
    const connectUrlEl = document.getElementById('connect-url');

    async function loadConnectInfo() {
      try {
        const response = await fetch('/connect-info');
        if (!response.ok) throw new Error('Failed to load connect info');
        const data = await response.json();
        connectQrEl.src = data.qrDataUrl;
        connectUrlEl.textContent = data.connectUrl;
      } catch {
        connectUrlEl.textContent = `${location.origin}/`;
      }
    }

    ws.onopen = () => { statusEl.textContent = 'display connected'; };
    ws.onclose = () => { statusEl.textContent = 'disconnected'; };

    ws.onmessage = (e) => {
      const msg = JSON.parse(e.data);

      if (msg.type === 'state') {
        players = {};
        for (const p of msg.players) players[p.id] = p;
        statusEl.textContent = `players: ${msg.players.length}`;
      }

      if (msg.type === 'reload_map') {
        console.log('[ws] reload_map received — restarting scene');
        statusEl.textContent = 'reloading map…';
        mapCacheBust = Date.now();
        game.scene.stop('GameScene');
        game.scene.start('GameScene');
      }
    };

    loadConnectInfo();
  </script>
</body>
</html>
