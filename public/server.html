<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Cacaotique — Display</title>
  <link rel="stylesheet" href="/styles/server.css" />
</head>
<body>
  <div id="status">connecting…</div>
  <div id="tasks-gui">
    <div id="tasks-title">:GUI:</div>
    <ul id="tasks-list">
      <li>planter une graine</li>
      <li>chercher de l'eau</li>
      <li>arroser la plante</li>
      <li>recolter la plante</li>
      <li>...</li>
    </ul>
  </div>
  <div id="game"></div>
  <div id="connect-panel">
    <img id="connect-qr" alt="QR code to connect controllers" />
    <div id="connect-url">loading…</div>
  </div>
  <audio id="ost" src="/assets/ost/CacaoTown.mp3" loop preload="auto"></audio>
  <script src="/phaser/phaser.min.js"></script>
  <script>
    // Start OST on first user interaction (browser autoplay policy)
    (function () {
      const ost = document.getElementById('ost');
      function tryPlay() {
        ost.play().catch(() => {});
        window.removeEventListener('click', tryPlay);
        window.removeEventListener('keydown', tryPlay);
      }
      ost.play().catch(() => {
        window.addEventListener('click', tryPlay);
        window.addEventListener('keydown', tryPlay);
      });
    })();
  </script>
  <script>
    // ── Shared state (updated by WebSocket, read by Phaser scene) ──────────
    let players = {};
    let plants = [];
    let inProgressByPlayer = {};
    let mapCacheBust = Date.now();
    const statusEl = document.getElementById('status');

    // ── Phaser scene ────────────────────────────────────────────────────────
    class GameScene extends Phaser.Scene {
      constructor() { super({ key: 'GameScene' }); }

      init() {
        // Called before preload on every (re)start — capture current cache bust
        this._mapUrl = '/assets/basemap2.tmj?t=' + mapCacheBust;
      }

      preload() {
        // Remove stale cached map so Phaser re-fetches from disk
        if (this.cache.tilemap.has('map')) this.cache.tilemap.remove('map');

        this.load.tilemapTiledJSON('map', this._mapUrl);
        this.load.image('tilemap_packed', '/assets/tilemap_packed.png?t=' + mapCacheBust);
        this.load.image('cacao_plant', '/assets/tiles/tile_0152_cacaotier0.png?t=' + mapCacheBust);
        this.load.image('cacao_plant_watered', '/assets/tiles/tile_0150_cacaotier1.png?t=' + mapCacheBust);

        // Character spritesheets — 96×24px, 4 frames of 24×24
        const t = mapCacheBust;
        this.load.spritesheet('char_red',    `/assets/characters/players/red.png?t=${t}`,    { frameWidth: 24, frameHeight: 24 });
        this.load.spritesheet('char_blue',   `/assets/characters/players/blue.png?t=${t}`,   { frameWidth: 24, frameHeight: 24 });
        this.load.spritesheet('char_yellow', `/assets/characters/players/yellow.png?t=${t}`, { frameWidth: 24, frameHeight: 24 });
        this.load.spritesheet('char_white',  `/assets/characters/players/white.png?t=${t}`,  { frameWidth: 24, frameHeight: 24 });
        this.load.image('oie0', `/assets/characters/oie/oie0.png?t=${t}`);
        this.load.image('oie1', `/assets/characters/oie/oie1.png?t=${t}`);
      }

      create() {
        // ── Tilemap ──────────────────────────────────────────────────────────
        const map = this.make.tilemap({ key: 'map' });

        if (!map) {
          console.warn('[GameScene] map.tmj not found — rendering placeholder grid');
          this._drawFallbackGrid();
          this._defineCharAnims();
          this._setupPlayers();
          this._setupBees();
          this._setupGeese();
          return;
        }

        // Try to add each tileset by its Tiled "Name"; fallback to shared texture key
        const resolvedTilesets = [];
        for (const ts of map.tilesets) {
          const key = ts.name;
          if (this.textures.exists(key)) {
            const resolved = map.addTilesetImage(ts.name, key);
            if (resolved) resolvedTilesets.push(resolved);
            continue;
          }

          if (this.textures.exists('tilemap_packed')) {
            const resolved = map.addTilesetImage(ts.name, 'tilemap_packed');
            if (resolved) resolvedTilesets.push(resolved);
            continue;
          }

          console.warn(`[GameScene] texture "${key}" not preloaded — skipping`);
        }

        if (resolvedTilesets.length === 0) {
          console.warn('[GameScene] no tileset resolved — rendering fallback grid');
          this._drawFallbackGrid();
          this._setupPlayers();
          return;
        }

        // Render all tile layers in order
        const layerNames = map.layers.map(l => l.name);
        console.log('[GameScene] layers found:', layerNames);

        let createdLayerCount = 0;

        for (const name of layerNames) {
          try {
            const layer = map.createLayer(name, resolvedTilesets, 0, 0);
            if (layer) createdLayerCount += 1;
          } catch (e) {
            console.warn(`[GameScene] could not create layer "${name}":`, e.message);
          }
        }

        if (createdLayerCount === 0) {
          console.warn('[GameScene] no tile layer created — rendering fallback grid');
          this._drawFallbackGrid();
          this._defineCharAnims();
          this._setupPlayers();
          this._setupBees();
          this._setupGeese();
          return;
        }

        // Fit camera to map
        this.fitMapToViewport(map.widthInPixels, map.heightInPixels);
        this.scale.on('resize', () => {
          this.fitMapToViewport(map.widthInPixels, map.heightInPixels);
        });

        this._defineCharAnims();
        this._setupPlayers();
        this._setupBees();
        this._setupGeese();
      }

      fitMapToViewport(mapWidth, mapHeight) {
        const cam = this.cameras.main;
        const padding = 24; // border inset in pixels
        const zoomX = (cam.width - padding * 2) / mapWidth;
        const zoomY = (cam.height - padding * 2) / mapHeight;
        cam.setZoom(Math.min(zoomX, zoomY));
        cam.centerOn(mapWidth / 2, mapHeight / 2);
      }

      _drawFallbackGrid() {
        const GRID_SIZE = 16, COLS = 30, ROWS = 20;
        const g = this.add.graphics();
        g.lineStyle(1, 0x2a2a4a, 1);
        for (let x = 0; x <= COLS; x++) {
          g.lineBetween(x * GRID_SIZE, 0, x * GRID_SIZE, ROWS * GRID_SIZE);
        }
        for (let y = 0; y <= ROWS; y++) {
          g.lineBetween(0, y * GRID_SIZE, COLS * GRID_SIZE, y * GRID_SIZE);
        }
      }

      // Maps server color hex → spritesheet key
      _colorToSpriteKey(color) {
        const map = {
          '#e74c3c': 'char_red',
          '#3498db': 'char_blue',
          '#ffffff': 'char_white',
          '#f1c40f': 'char_yellow',
        };
        return map[color] || 'char_red';
      }

      _defineCharAnims() {
        const COLORS = ['red', 'blue', 'yellow', 'white'];
        for (const c of COLORS) {
          const key = `char_${c}`;
          if (!this.anims.exists(`idle_${c}`)) {
            this.anims.create({
              key: `idle_${c}`,
              frames: this.anims.generateFrameNumbers(key, { start: 0, end: 1 }),
              frameRate: 4,
              repeat: -1,
            });
          }
          if (!this.anims.exists(`run_${c}`)) {
            this.anims.create({
              key: `run_${c}`,
              frames: this.anims.generateFrameNumbers(key, { start: 2, end: 3 }),
              frameRate: 8,
              repeat: -1,
            });
          }
        }
      }

      _setupBees() {
        // Tile 95 = bee hive at grid col=4, row=18 → world center (72, 296) in 16px tile space
        const HIVE_X = 4 * 16 + 8;
        const HIVE_Y = 18 * 16 + 8;
        const BEE_COUNT = 10;

        this._bees = [];
        for (let i = 0; i < BEE_COUNT; i++) {
          const g = this.add.graphics();
          // Body
          g.fillStyle(0xf5c518, 1);
          g.fillEllipse(0, 0, 2.4, 1.8);
          // Stripes
          g.fillStyle(0x3a2800, 1);
          g.fillRect(-0.6, -0.6, 0.6, 1.2);
          g.fillRect(0.6, -0.6, 0.6, 1.2);
          // Wings
          g.fillStyle(0xcceeff, 0.6);
          g.fillEllipse(-1.2, -1.2, 1.8, 1.2);
          g.fillEllipse(1.2, -1.2, 1.8, 1.2);
          g.setDepth(10);

          const phase = (i / BEE_COUNT) * Math.PI * 2;
          const radius = 10 + Math.random() * 12;
          const speed  = 1.2 + Math.random() * 1.0;
          const yWobble = 3 + Math.random() * 4;
          const wobbleSpeed = 1.5 + Math.random() * 2;
          const wobblePhase = Math.random() * Math.PI * 2;

          this._bees.push({ g, phase, radius, speed, yWobble, wobbleSpeed, wobblePhase });
          g.setPosition(HIVE_X, HIVE_Y);
        }

        this._hiveX = HIVE_X;
        this._hiveY = HIVE_Y;
        this._beeTime = 0;
      }

      _setupGeese() {
        const MAP_W = 30 * 16; // 480px display width
        const MAP_H = 20 * 16; // 320px display height
        const MARGIN = 24;
        const GOOSE_SPEED = 12; // px/s
        const GOOSE_COUNT = 3;

        this._geese = [];
        for (let i = 0; i < GOOSE_COUNT; i++) {
          const x = MARGIN + Math.random() * (MAP_W - MARGIN * 2);
          const y = MARGIN + Math.random() * (MAP_H - MARGIN * 2);
          const img = this.add.image(x, y, 'oie0');
          img.setScale(16 / img.width); // scale to roughly 1 tile
          img.setDepth(5);

          // Pick a random direction angle
          const angle = Math.random() * Math.PI * 2;
          this._geese.push({
            img,
            vx: Math.cos(angle) * GOOSE_SPEED,
            vy: Math.sin(angle) * GOOSE_SPEED,
            frameTimer: 0,
            frameCurrent: 0,
            dirTimer: 1.5 + Math.random() * 2.5,
          });
        }
        this._gooseMapW = MAP_W;
        this._gooseMapH = MAP_H;
        this._gooseMargin = MARGIN;
        this._gooseSpeed = GOOSE_SPEED;
      }

      _setupPlayers() {
        this._sprites = {};  // id → Phaser.GameObjects.Sprite
        this._labels = {};   // id → Phaser.GameObjects.Text
        this._local = {};    // id → { x, y } — client-extrapolated pixel positions (display scale)
        this._progressBars = {}; // id -> { bg, fill }
        this._plantSprites = {}; // id -> Phaser.GameObjects.Image
      }

      update(time, delta) {
        if (!this._sprites) return;

        // Animate bees around the hive
        if (this._bees) {
          this._beeTime += delta / 1000;
          for (const b of this._bees) {
            const angle = b.phase + this._beeTime * b.speed;
            const wx = Math.cos(angle) * b.radius;
            const wy = Math.sin(angle) * b.radius * 0.5 // flatten orbit
                     + Math.sin(this._beeTime * b.wobbleSpeed + b.wobblePhase) * b.yWobble;
            b.g.setPosition(this._hiveX + wx, this._hiveY + wy);
            // Flip graphic when moving left
            b.g.setScale(Math.cos(angle + 0.01) - Math.cos(angle) < 0 ? -1 : 1, 1);
          }
        }
        // Animate geese wandering around the map
        if (this._geese) {
          const dt_s = delta / 1000;
          const MARGIN = this._gooseMargin;
          const SPEED = this._gooseSpeed;
          const MAP_W = this._gooseMapW;
          const MAP_H = this._gooseMapH;
          for (const g of this._geese) {
            // Move
            g.img.x += g.vx * dt_s;
            g.img.y += g.vy * dt_s;

            // Bounce off map edges
            if (g.img.x < MARGIN)        { g.img.x = MARGIN;        g.vx =  Math.abs(g.vx); }
            if (g.img.x > MAP_W - MARGIN) { g.img.x = MAP_W - MARGIN; g.vx = -Math.abs(g.vx); }
            if (g.img.y < MARGIN)        { g.img.y = MARGIN;        g.vy =  Math.abs(g.vy); }
            if (g.img.y > MAP_H - MARGIN) { g.img.y = MAP_H - MARGIN; g.vy = -Math.abs(g.vy); }

            // Random direction change
            g.dirTimer -= dt_s;
            if (g.dirTimer <= 0) {
              const angle = Math.random() * Math.PI * 2;
              g.vx = Math.cos(angle) * SPEED;
              g.vy = Math.sin(angle) * SPEED;
              g.dirTimer = 1.5 + Math.random() * 2.5;
            }

            // Flip based on horizontal direction
            g.img.setFlipX(g.vx > 0);

            // Walk animation: alternate frame every 0.2s
            g.frameTimer += dt_s;
            if (g.frameTimer >= 0.2) {
              g.frameTimer = 0;
              g.frameCurrent = 1 - g.frameCurrent;
              g.img.setTexture(g.frameCurrent === 0 ? 'oie0' : 'oie1');
            }
          }
        }

        const DISPLAY_GRID = 16; // display tile size
        const SCALE = DISPLAY_GRID / 32; // server uses 32px grid
        const dt = delta / 1000; // seconds
        const CORRECTION = 0.2; // per-frame lerp strength toward server truth

        const activeIds = new Set(Object.keys(players));
        const activePlantIds = new Set(plants.map(plant => String(plant.id)));

        for (const plant of plants) {
          const plantId = String(plant.id);
          const plantX = plant.gridX * DISPLAY_GRID + DISPLAY_GRID / 2;
          const plantY = plant.gridY * DISPLAY_GRID + DISPLAY_GRID / 2;

          if (!this._plantSprites[plantId]) {
            const textureKey = plant.watered ? 'cacao_plant_watered' : 'cacao_plant';
            const plantSprite = this.add.image(plantX, plantY, textureKey);
            plantSprite.setDisplaySize(DISPLAY_GRID, DISPLAY_GRID);
            this._plantSprites[plantId] = plantSprite;
          }

          const textureKey = plant.watered ? 'cacao_plant_watered' : 'cacao_plant';
          this._plantSprites[plantId].setTexture(textureKey);
          this._plantSprites[plantId].setPosition(plantX, plantY);
        }

        for (const plantId of Object.keys(this._plantSprites)) {
          if (!activePlantIds.has(plantId)) {
            this._plantSprites[plantId].destroy();
            delete this._plantSprites[plantId];
          }
        }

        for (const p of Object.values(players)) {
          const spriteKey = this._colorToSpriteKey(p.color);
          const colorName = spriteKey.replace('char_', '');

          // Server authoritative position in display pixels
          const sx = p.x * SCALE;
          const sy = p.y * SCALE;

          // Create sprite on first appearance
          if (!this._sprites[p.id]) {
            const spr = this.add.sprite(sx, sy, spriteKey);
            spr.setScale(DISPLAY_GRID / 24);
            spr.play(`idle_${colorName}`);
            this._sprites[p.id] = spr;
            this._local[p.id] = { x: sx, y: sy };

            const bg = this.add.rectangle(sx, sy - 12, DISPLAY_GRID + 2, 5, 0x1f1f33);
            bg.setVisible(false);
            bg.height = 7;
            const fill = this.add.rectangle(sx - DISPLAY_GRID / 2, sy - 12, 0, 5, 0x4a4a8a);
            fill.setOrigin(0, 0.5);
            fill.setVisible(false);
            this._progressBars[p.id] = { bg, fill };
            const lbl = this.add.text(sx, sy - 9, p.name, {
              fontSize: '6px',
              fontFamily: 'Arial, sans-serif',
              color: '#ffffff',
              stroke: '#000000',
              strokeThickness: 1.5,
              resolution: window.devicePixelRatio * 4,
            }).setOrigin(0.5, 1);
            this._labels[p.id] = lbl;
          }

          const spr = this._sprites[p.id];
          const loc = this._local[p.id];

          // Extrapolate using server velocity
          loc.x += (p.vx || 0) * SCALE * dt;
          loc.y += (p.vy || 0) * SCALE * dt;

          // Gently correct toward server position to prevent drift
          loc.x += (sx - loc.x) * CORRECTION;
          loc.y += (sy - loc.y) * CORRECTION;

          const moving = (p.vx !== 0 || p.vy !== 0);

          // Flip horizontally based on horizontal velocity
          if ((p.vx || 0) < 0) spr.setFlipX(true);
          else if ((p.vx || 0) > 0) spr.setFlipX(false);

          const targetAnim = moving ? `run_${colorName}` : `idle_${colorName}`;
          if (spr.anims.currentAnim?.key !== targetAnim) spr.play(targetAnim);

          spr.setPosition(loc.x, loc.y);

          const bar = this._progressBars[p.id];
          if (bar) {
            const progressAction = inProgressByPlayer[p.id] || inProgressByPlayer[String(p.id)];
            if (progressAction && progressAction.status === 'in_progress' && progressAction.startedAt) {
              const elapsed = Date.now() - progressAction.startedAt;
              const ratio = Math.max(0, Math.min(1, elapsed / progressAction.durationMs));
              const barWidth = DISPLAY_GRID + 2;
              bar.bg.setPosition(loc.x, loc.y - 22);
              bar.bg.setVisible(true);
              bar.fill.width = barWidth * ratio;
              bar.fill.setPosition(loc.x - barWidth / 2, loc.y - 22);
              bar.fill.setVisible(true);
            } else {
              bar.bg.setVisible(false);
              bar.fill.setVisible(false);
            }
          }
          if (this._labels[p.id]) this._labels[p.id].setPosition(loc.x, loc.y - 10);
        }

        // Remove sprites for disconnected players
        for (const id of Object.keys(this._sprites)) {
          if (!activeIds.has(id)) {
            this._sprites[id].destroy();
            delete this._sprites[id];
            if (this._labels[id]) { this._labels[id].destroy(); delete this._labels[id]; }
            delete this._local[id];
            if (this._progressBars[id]) {
              this._progressBars[id].bg.destroy();
              this._progressBars[id].fill.destroy();
              delete this._progressBars[id];
            }
          }
        }
      }
    }

    // ── Phaser config ───────────────────────────────────────────────────────
    const config = {
      type: Phaser.AUTO,
      width: window.innerWidth,
      height: window.innerHeight,
      backgroundColor: '#1a1a2e',
      pixelArt: true,
      scene: [GameScene],
      parent: 'game',
      scale: {
        mode: Phaser.Scale.RESIZE,
        autoCenter: Phaser.Scale.CENTER_BOTH,
      },
    };

    const game = new Phaser.Game(config);

    // ── WebSocket ───────────────────────────────────────────────────────────
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    const ws = new WebSocket(`${proto}://${location.host}`);
    const connectQrEl = document.getElementById('connect-qr');
    const connectUrlEl = document.getElementById('connect-url');

    async function loadConnectInfo() {
      try {
        const response = await fetch('/connect-info');
        if (!response.ok) throw new Error('Failed to load connect info');
        const data = await response.json();
        connectQrEl.src = data.qrDataUrl;
        connectUrlEl.textContent = data.connectUrl;
      } catch {
        connectUrlEl.textContent = `${location.origin}/`;
      }
    }

    ws.onopen = () => { statusEl.textContent = 'display connected'; };
    ws.onclose = () => { statusEl.textContent = 'disconnected'; };

    ws.onmessage = (e) => {
      const msg = JSON.parse(e.data);

      if (msg.type === 'state') {
        players = {};
        for (const p of msg.players) players[p.id] = p;
        statusEl.textContent = `players: ${msg.players.length}`;
      }

      if (msg.type === 'action_update') {
        inProgressByPlayer = msg.inProgressByPlayer || {};
        plants = msg.plants || [];
      }

      if (msg.type === 'reload_map') {
        console.log('[ws] reload_map received — restarting scene');
        statusEl.textContent = 'reloading map…';
        mapCacheBust = Date.now();
        game.scene.stop('GameScene');
        game.scene.start('GameScene');
      }
    };

    loadConnectInfo();
  </script>
</body>
</html>
