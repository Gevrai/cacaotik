<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Cacaotique — Display</title>
  <link rel="stylesheet" href="/styles/server.css" />
</head>
<body>
  <div id="status">connecting…</div>
  <div id="tasks-gui">
    <div id="tasks-title">:GUI:</div>
    <ul id="tasks-list">
      <li>planter une graine</li>
      <li>chercher de l'eau</li>
      <li>arroser la plante</li>
      <li>parler aux abeilles</li>
      <li>recolter le cacao</li>
      <li>mettre le feu</li>
      <li>...</li>
    </ul>
  </div>
  <div id="game"></div>
  <div id="connect-panel">
    <img id="connect-qr" alt="QR code to connect controllers" />
    <div id="connect-url">loading…</div>
  </div>
  <audio id="ost" src="/assets/ost/CacaoTown.mp3" loop preload="auto"></audio>
  <script src="/phaser/phaser.min.js"></script>
  <script>
    // Start OST on first user interaction (browser autoplay policy)
    (function () {
      const ost = document.getElementById('ost');
      function tryPlay() {
        ost.play().catch(() => {});
        window.removeEventListener('click', tryPlay);
        window.removeEventListener('keydown', tryPlay);
      }
      ost.play().catch(() => {
        window.addEventListener('click', tryPlay);
        window.addEventListener('keydown', tryPlay);
      });
    })();
  </script>
  <script>
    // ── Shared state (updated by WebSocket, read by Phaser scene) ──────────
    let players = {};
    let plants = [];
    let beeFlights = [];
    let inProgressByPlayer = {};
      let fireBursts = [];
    let mapCacheBust = Date.now();
    const statusEl = document.getElementById('status');

    // ── Phaser scene ────────────────────────────────────────────────────────
    class GameScene extends Phaser.Scene {
      constructor() { super({ key: 'GameScene' }); }

      init() {
        // Called before preload on every (re)start — capture current cache bust
        this._mapUrl = '/assets/basemap2.tmj?t=' + mapCacheBust;
      }

      preload() {
        // Remove stale cached map so Phaser re-fetches from disk
        if (this.cache.tilemap.has('map')) this.cache.tilemap.remove('map');

        this.load.tilemapTiledJSON('map', this._mapUrl);
        this.load.image('tilemap_packed', '/assets/tilemap_packed.png?t=' + mapCacheBust);
        this.load.image('cacao_plant', '/assets/tiles/tile_0152_cacaotier0.png?t=' + mapCacheBust);
        this.load.image('cacao_plant_watered', '/assets/tiles/tile_0150_cacaotier1.png?t=' + mapCacheBust);
        this.load.image('cacao_plant_blossom', '/assets/tiles/tile_0151_cacaotier2.png?t=' + mapCacheBust);

        // Character spritesheets — 96×24px, 4 frames of 24×24
        const t = mapCacheBust;
        this.load.spritesheet('char_red',    `/assets/characters/players/red.png?t=${t}`,    { frameWidth: 24, frameHeight: 24 });
        this.load.spritesheet('char_blue',   `/assets/characters/players/blue.png?t=${t}`,   { frameWidth: 24, frameHeight: 24 });
        this.load.spritesheet('char_yellow', `/assets/characters/players/yellow.png?t=${t}`, { frameWidth: 24, frameHeight: 24 });
        this.load.spritesheet('char_white',  `/assets/characters/players/white.png?t=${t}`,  { frameWidth: 24, frameHeight: 24 });
        this.load.image('oie0', `/assets/characters/oie/oie0.png?t=${t}`);
        this.load.image('oie1', `/assets/characters/oie/oie1.png?t=${t}`);
        this.load.image('llama_walk1',  `/assets/characters/llama/llama_walk1.png?t=${t}`);
        this.load.image('llama_walk2',  `/assets/characters/llama/llama_walk2.png?t=${t}`);
        this.load.image('llama_stand',  `/assets/characters/llama/llama_stand.png?t=${t}`);
        this.load.image('llama_sit',    `/assets/characters/llama/llama_sit.png?t=${t}`);
        this.load.image('lapin_sit',  `/assets/characters/lapin/lapin_sit.png?t=${t}`);
        this.load.image('lapin_run1', `/assets/characters/lapin/lapin_run1.png?t=${t}`);
        this.load.image('lapin_run2', `/assets/characters/lapin/lapin_run2.png?t=${t}`);
      }

      create() {
        // ── Tilemap ──────────────────────────────────────────────────────────
        const map = this.make.tilemap({ key: 'map' });

        if (!map) {
          console.warn('[GameScene] map.tmj not found — rendering placeholder grid');
          this._drawFallbackGrid();
          this._defineCharAnims();
          this._setupPlayers();
          this._setupBees();
          this._setupGeese();
          this._setupLlamas();
          this._setupLapins();
          return;
        }

        // Try to add each tileset by its Tiled "Name"; fallback to shared texture key
        const resolvedTilesets = [];
        for (const ts of map.tilesets) {
          const key = ts.name;
          if (this.textures.exists(key)) {
            const resolved = map.addTilesetImage(ts.name, key);
            if (resolved) resolvedTilesets.push(resolved);
            continue;
          }

          if (this.textures.exists('tilemap_packed')) {
            const resolved = map.addTilesetImage(ts.name, 'tilemap_packed');
            if (resolved) resolvedTilesets.push(resolved);
            continue;
          }

          console.warn(`[GameScene] texture "${key}" not preloaded — skipping`);
        }

        if (resolvedTilesets.length === 0) {
          console.warn('[GameScene] no tileset resolved — rendering fallback grid');
          this._drawFallbackGrid();
          this._setupPlayers();
          return;
        }

        // Render all tile layers in order
        const layerNames = map.layers.map(l => l.name);
        console.log('[GameScene] layers found:', layerNames);

        let createdLayerCount = 0;

        for (const name of layerNames) {
          try {
            const layer = map.createLayer(name, resolvedTilesets, 0, 0);
            if (layer) createdLayerCount += 1;
          } catch (e) {
            console.warn(`[GameScene] could not create layer "${name}":`, e.message);
          }
        }

        if (createdLayerCount === 0) {
          console.warn('[GameScene] no tile layer created — rendering fallback grid');
          this._drawFallbackGrid();
          this._defineCharAnims();
          this._setupPlayers();
          this._setupBees();
          this._setupGeese();
          this._setupLlamas();
          this._setupLapins();
          return;
        }

        // Fit camera to map
        this.fitMapToViewport(map.widthInPixels, map.heightInPixels);
        this.scale.on('resize', () => {
          this.fitMapToViewport(map.widthInPixels, map.heightInPixels);
        });

        this._defineCharAnims();
        this._setupPlayers();
        this._setupBees();
        this._setupGeese();
        this._setupLlamas();
        this._buildBlockedCells(map);
        this._setupLapins();
      }

      fitMapToViewport(mapWidth, mapHeight) {
        const cam = this.cameras.main;
        const padding = 24; // border inset in pixels
        const zoomX = (cam.width - padding * 2) / mapWidth;
        const zoomY = (cam.height - padding * 2) / mapHeight;
        cam.setZoom(Math.min(zoomX, zoomY));
        cam.centerOn(mapWidth / 2, mapHeight / 2);
      }

      _drawFallbackGrid() {
        const GRID_SIZE = 16, COLS = 30, ROWS = 20;
        const g = this.add.graphics();
        g.lineStyle(1, 0x2a2a4a, 1);
        for (let x = 0; x <= COLS; x++) {
          g.lineBetween(x * GRID_SIZE, 0, x * GRID_SIZE, ROWS * GRID_SIZE);
        }
        for (let y = 0; y <= ROWS; y++) {
          g.lineBetween(0, y * GRID_SIZE, COLS * GRID_SIZE, y * GRID_SIZE);
        }
      }

      // Maps server color hex → spritesheet key
      _colorToSpriteKey(color) {
        const map = {
          '#e74c3c': 'char_red',
          '#3498db': 'char_blue',
          '#ffffff': 'char_white',
          '#f1c40f': 'char_yellow',
        };
        return map[color] || 'char_red';
      }

      _defineCharAnims() {
        const COLORS = ['red', 'blue', 'yellow', 'white'];
        for (const c of COLORS) {
          const key = `char_${c}`;
          if (!this.anims.exists(`idle_${c}`)) {
            this.anims.create({
              key: `idle_${c}`,
              frames: this.anims.generateFrameNumbers(key, { start: 0, end: 1 }),
              frameRate: 4,
              repeat: -1,
            });
          }
          if (!this.anims.exists(`run_${c}`)) {
            this.anims.create({
              key: `run_${c}`,
              frames: this.anims.generateFrameNumbers(key, { start: 2, end: 3 }),
              frameRate: 8,
              repeat: -1,
            });
          }
        }
      }

      _setupBees() {
        // Tile 95 = bee hive at grid col=4, row=18 → world center (72, 296) in 16px tile space
        const HIVE_X = 4 * 16 + 8;
        const HIVE_Y = 18 * 16 + 8;
        const BEE_COUNT = 10;

        this._bees = [];
        for (let i = 0; i < BEE_COUNT; i++) {
          const g = this.add.graphics();
          // Body
          g.fillStyle(0xf5c518, 1);
          g.fillEllipse(0, 0, 2.4, 1.8);
          // Stripes
          g.fillStyle(0x3a2800, 1);
          g.fillRect(-0.6, -0.6, 0.6, 1.2);
          g.fillRect(0.6, -0.6, 0.6, 1.2);
          // Wings
          g.fillStyle(0xcceeff, 0.6);
          g.fillEllipse(-1.2, -1.2, 1.8, 1.2);
          g.fillEllipse(1.2, -1.2, 1.8, 1.2);
          g.setDepth(10);

          const phase = (i / BEE_COUNT) * Math.PI * 2;
          const radius = 10 + Math.random() * 12;
          const speed  = 1.2 + Math.random() * 1.0;
          const yWobble = 3 + Math.random() * 4;
          const wobbleSpeed = 1.5 + Math.random() * 2;
          const wobblePhase = Math.random() * Math.PI * 2;

          this._bees.push({ g, phase, radius, speed, yWobble, wobbleSpeed, wobblePhase });
          g.setPosition(HIVE_X, HIVE_Y);
        }

        this._hiveX = HIVE_X;
        this._hiveY = HIVE_Y;
        this._beeTime = 0;
      }

      _setupGeese() {
        const MAP_W = 30 * 16; // 480px display width
        const MAP_H = 20 * 16; // 320px display height
        const MARGIN = 24;
        const GOOSE_SPEED = 12; // px/s
        const GOOSE_COUNT = 3;

        this._geese = [];
        for (let i = 0; i < GOOSE_COUNT; i++) {
          const x = MARGIN + Math.random() * (MAP_W - MARGIN * 2);
          const y = MARGIN + Math.random() * (MAP_H - MARGIN * 2);
          const img = this.add.image(x, y, 'oie0');
          img.setScale(16 / img.width); // scale to roughly 1 tile
          img.setDepth(5);

          // Pick a random direction angle
          const angle = Math.random() * Math.PI * 2;
          this._geese.push({
            img,
            vx: Math.cos(angle) * GOOSE_SPEED,
            vy: Math.sin(angle) * GOOSE_SPEED,
            frameTimer: 0,
            frameCurrent: 0,
            dirTimer: 1.5 + Math.random() * 2.5,
          });
        }
        this._gooseMapW = MAP_W;
        this._gooseMapH = MAP_H;
        this._gooseMargin = MARGIN;
        this._gooseSpeed = GOOSE_SPEED;
      }

      _setupLlamas() {
        const MAP_W = 30 * 16;
        const MAP_H = 20 * 16;
        const MARGIN = 24;
        const LLAMA_COUNT = 2;
        const LLAMA_SPEED = 14; // px/s

        this._llamas = [];
        for (let i = 0; i < LLAMA_COUNT; i++) {
          const x = MARGIN + Math.random() * (MAP_W - MARGIN * 2);
          const y = MARGIN + Math.random() * (MAP_H - MARGIN * 2);
          const img = this.add.image(x, y, 'llama_stand');
          img.setScale(20 / img.width); // roughly 1.25 tiles tall
          img.setDepth(5);

          // Llamas start in a random idle state
          const roll = Math.random();
          const state = roll < 0.4 ? 'sit' : roll < 0.7 ? 'stand' : 'walk';
          const angle = Math.random() * Math.PI * 2;
          this._llamas.push({
            img,
            state,           // 'walk' | 'stand' | 'sit'
            vx: state === 'walk' ? Math.cos(angle) * LLAMA_SPEED : 0,
            vy: state === 'walk' ? Math.sin(angle) * LLAMA_SPEED : 0,
            stateTimer: 2 + Math.random() * 5,
            frameTimer: 0,
            frameCurrent: 0,
          });
          img.setTexture(state === 'sit' ? 'llama_sit' : 'llama_stand');
        }
        this._llamaMapW = MAP_W;
        this._llamaMapH = MAP_H;
        this._llamaMargin = MARGIN;
        this._llamaSpeed = LLAMA_SPEED;
      }

      _buildBlockedCells(map) {
        this._blockedCells = new Set();
        if (!map) return;
        const TILE = 16;
        const keywords = ['border', 'collision', 'solid', 'wall', 'palisade'];
        const isCollision = name => keywords.some(k => name.toLowerCase().includes(k));

        // Tile layers — map.layers is flat (Phaser flattens groups)
        for (const layerData of map.layers) {
          if (!isCollision(layerData.name || '')) continue;
          const cols = map.width;
          // layerData.data is a 2D array of Tile objects in Phaser
          for (let row = 0; row < layerData.data.length; row++) {
            for (let col = 0; col < (layerData.data[row] || []).length; col++) {
              const tile = layerData.data[row][col];
              if (tile && tile.index > 0) {
                this._blockedCells.add(`${col},${row}`);
              }
            }
          }
        }

        // Object layers — map.objects is a flat array of { name, objects[] }
        for (const objLayer of map.objects || []) {
          if (!isCollision(objLayer.name || '')) continue;
          for (const obj of objLayer.objects || []) {
            const ox = Number(obj.x) || 0;
            const oy = Number(obj.y) || 0;
            const ow = Number(obj.width) || TILE;
            const oh = Number(obj.height) || TILE;
            const x0 = Math.floor(ox / TILE);
            const y0 = Math.floor(oy / TILE);
            const x1 = Math.floor((ox + Math.max(1, ow) - 1) / TILE);
            const y1 = Math.floor((oy + Math.max(1, oh) - 1) / TILE);
            for (let gy = y0; gy <= y1; gy++) for (let gx = x0; gx <= x1; gx++)
              this._blockedCells.add(`${gx},${gy}`);
          }
        }
        console.log('[GameScene] blocked cells:', this._blockedCells.size);
      }

      _setupLapins() {
        const MAP_W = 30 * 16;
        const MAP_H = 20 * 16;
        const MARGIN = 20;
        const LAPIN_COUNT = 3;
        const LAPIN_SPEED = 28; // px/s — faster than llama

        this._lapins = [];
        for (let i = 0; i < LAPIN_COUNT; i++) {
          const x = MARGIN + Math.random() * (MAP_W - MARGIN * 2);
          const y = MARGIN + Math.random() * (MAP_H - MARGIN * 2);
          const img = this.add.image(x, y, 'lapin_sit');
          img.setScale(14 / img.width); // ~14px display size
          img.setDepth(5);

          const roll = Math.random();
          const state = roll < 0.4 ? 'sit' : 'run';
          const angle = Math.random() * Math.PI * 2;
          this._lapins.push({
            img,
            state,           // 'run' | 'sit'
            vx: state === 'run' ? Math.cos(angle) * LAPIN_SPEED : 0,
            vy: state === 'run' ? Math.sin(angle) * LAPIN_SPEED : 0,
            stateTimer: 1 + Math.random() * 4,
            frameTimer: 0,
            frameCurrent: 0,
          });
          img.setTexture(state === 'sit' ? 'lapin_sit' : 'lapin_run1');
        }
        this._lapinMapW = MAP_W;
        this._lapinMapH = MAP_H;
        this._lapinMargin = MARGIN;
        this._lapinSpeed = LAPIN_SPEED;
      }

      _setupPlayers() {
        this._sprites = {};  // id → Phaser.GameObjects.Sprite
        this._labels = {};   // id → Phaser.GameObjects.Text
        this._local = {};    // id → { x, y } — client-extrapolated pixel positions (display scale)
        this._progressBars = {}; // id -> { bg, fill }
        this._plantSprites = {}; // id -> Phaser.GameObjects.Image
        this._flightBees = {}; // id -> Phaser.GameObjects.Graphics
        this._fireBursts = {}; // id -> Phaser.GameObjects.Graphics
      }

      update(time, delta) {
        if (!this._sprites) return;

        // Animate bees around the hive
        if (this._bees) {
          this._beeTime += delta / 1000;
          for (const b of this._bees) {
            const angle = b.phase + this._beeTime * b.speed;
            const wx = Math.cos(angle) * b.radius;
            const wy = Math.sin(angle) * b.radius * 0.5 // flatten orbit
                     + Math.sin(this._beeTime * b.wobbleSpeed + b.wobblePhase) * b.yWobble;
            b.g.setPosition(this._hiveX + wx, this._hiveY + wy);
            // Flip graphic when moving left
            b.g.setScale(Math.cos(angle + 0.01) - Math.cos(angle) < 0 ? -1 : 1, 1);
          }
        }
        // Animate geese wandering around the map
        if (this._geese) {
          const dt_s = delta / 1000;
          const MARGIN = this._gooseMargin;
          const SPEED = this._gooseSpeed;
          const MAP_W = this._gooseMapW;
          const MAP_H = this._gooseMapH;
          for (const g of this._geese) {
            // Move
            g.img.x += g.vx * dt_s;
            g.img.y += g.vy * dt_s;

            // Bounce off map edges
            if (g.img.x < MARGIN)        { g.img.x = MARGIN;        g.vx =  Math.abs(g.vx); }
            if (g.img.x > MAP_W - MARGIN) { g.img.x = MAP_W - MARGIN; g.vx = -Math.abs(g.vx); }
            if (g.img.y < MARGIN)        { g.img.y = MARGIN;        g.vy =  Math.abs(g.vy); }
            if (g.img.y > MAP_H - MARGIN) { g.img.y = MAP_H - MARGIN; g.vy = -Math.abs(g.vy); }

            // Random direction change
            g.dirTimer -= dt_s;
            if (g.dirTimer <= 0) {
              const angle = Math.random() * Math.PI * 2;
              g.vx = Math.cos(angle) * SPEED;
              g.vy = Math.sin(angle) * SPEED;
              g.dirTimer = 1.5 + Math.random() * 2.5;
            }

            // Flip based on horizontal direction
            g.img.setFlipX(g.vx > 0);

            // Walk animation: alternate frame every 0.2s
            g.frameTimer += dt_s;
            if (g.frameTimer >= 0.2) {
              g.frameTimer = 0;
              g.frameCurrent = 1 - g.frameCurrent;
              g.img.setTexture(g.frameCurrent === 0 ? 'oie0' : 'oie1');
            }
          }
        }
        // Animate llamas — prefer sitting/standing, occasionally walk
        if (this._llamas) {
          const dt_s = delta / 1000;
          const MAP_W = this._llamaMapW;
          const MAP_H = this._llamaMapH;
          const MARGIN = this._llamaMargin;
          const SPEED = this._llamaSpeed;
          for (const l of this._llamas) {
            l.stateTimer -= dt_s;
            if (l.stateTimer <= 0) {
              // Weighted transition: 40% sit, 30% stand, 30% walk
              const roll = Math.random();
              if (roll < 0.4) {
                l.state = 'sit';
                l.vx = 0; l.vy = 0;
                l.img.setTexture('llama_sit');
                l.stateTimer = 3 + Math.random() * 6;
              } else if (roll < 0.7) {
                l.state = 'stand';
                l.vx = 0; l.vy = 0;
                l.img.setTexture('llama_stand');
                l.stateTimer = 1.5 + Math.random() * 4;
              } else {
                l.state = 'walk';
                const angle = Math.random() * Math.PI * 2;
                l.vx = Math.cos(angle) * SPEED;
                l.vy = Math.sin(angle) * SPEED;
                l.stateTimer = 1 + Math.random() * 2.5;
              }
            }

            if (l.state === 'walk') {
              l.img.x += l.vx * dt_s;
              l.img.y += l.vy * dt_s;

              // Bounce off edges
              if (l.img.x < MARGIN)        { l.img.x = MARGIN;        l.vx =  Math.abs(l.vx); }
              if (l.img.x > MAP_W - MARGIN) { l.img.x = MAP_W - MARGIN; l.vx = -Math.abs(l.vx); }
              if (l.img.y < MARGIN)        { l.img.y = MARGIN;        l.vy =  Math.abs(l.vy); }
              if (l.img.y > MAP_H - MARGIN) { l.img.y = MAP_H - MARGIN; l.vy = -Math.abs(l.vy); }

              // Sprites face left — flip when moving right
              l.img.setFlipX(l.vx > 0);

              // Walk animation: alternate walk1/walk2 every 0.2s
              l.frameTimer += dt_s;
              if (l.frameTimer >= 0.2) {
                l.frameTimer = 0;
                l.frameCurrent = 1 - l.frameCurrent;
                l.img.setTexture(l.frameCurrent === 0 ? 'llama_walk1' : 'llama_walk2');
              }
            }
          }
          // Llama-llama collision (only 2, so one pair)
          const LLAMA_RADIUS = 10;
          const [a, b] = this._llamas;
          if (a && b) {
            const dx = b.img.x - a.img.x;
            const dy = b.img.y - a.img.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < LLAMA_RADIUS * 2 && dist > 0) {
              const nx = dx / dist;
              const ny = dy / dist;
              const overlap = LLAMA_RADIUS * 2 - dist;
              a.img.x -= nx * overlap * 0.5;
              a.img.y -= ny * overlap * 0.5;
              b.img.x += nx * overlap * 0.5;
              b.img.y += ny * overlap * 0.5;
              // Reflect velocities along collision normal
              const aDot = a.vx * nx + a.vy * ny;
              const bDot = b.vx * nx + b.vy * ny;
              a.vx -= (aDot - bDot) * nx;
              a.vy -= (aDot - bDot) * ny;
              b.vx -= (bDot - aDot) * nx;
              b.vy -= (bDot - aDot) * ny;
            }
          }
        }

        // Animate lapins — mostly running, sometimes sit
        if (this._lapins) {
          const dt_s = delta / 1000;
          const MAP_W = this._lapinMapW;
          const MAP_H = this._lapinMapH;
          const MARGIN = this._lapinMargin;
          const SPEED = this._lapinSpeed;
          for (const l of this._lapins) {
            l.stateTimer -= dt_s;
            if (l.stateTimer <= 0) {
              // Weighted: 30% sit, 70% run
              if (Math.random() < 0.3) {
                l.state = 'sit';
                l.vx = 0; l.vy = 0;
                l.img.setTexture('lapin_sit');
                l.stateTimer = 1 + Math.random() * 3;
              } else {
                l.state = 'run';
                const angle = Math.random() * Math.PI * 2;
                l.vx = Math.cos(angle) * SPEED;
                l.vy = Math.sin(angle) * SPEED;
                l.stateTimer = 0.5 + Math.random() * 1.5;
              }
            }

            if (l.state === 'run') {
              const TILE = 16;
              const R = 5; // collision radius in px
              const blocked = this._blockedCells;

              // Axis-separated movement + tile collision
              const nx = l.img.x + l.vx * dt_s;
              const ny = l.img.y;
              const gxN = Math.floor((nx + (l.vx > 0 ? R : -R)) / TILE);
              const gyN = Math.floor((ny) / TILE);
              if (!blocked || !blocked.has(`${gxN},${gyN}`)) {
                l.img.x = nx;
              } else {
                l.vx = -l.vx;
              }

              const nx2 = l.img.x;
              const ny2 = l.img.y + l.vy * dt_s;
              const gxN2 = Math.floor((nx2) / TILE);
              const gyN2 = Math.floor((ny2 + (l.vy > 0 ? R : -R)) / TILE);
              if (!blocked || !blocked.has(`${gxN2},${gyN2}`)) {
                l.img.y = ny2;
              } else {
                l.vy = -l.vy;
              }

              // Bounce off edges
              if (l.img.x < MARGIN)         { l.img.x = MARGIN;         l.vx =  Math.abs(l.vx); }
              if (l.img.x > MAP_W - MARGIN)  { l.img.x = MAP_W - MARGIN; l.vx = -Math.abs(l.vx); }
              if (l.img.y < MARGIN)         { l.img.y = MARGIN;         l.vy =  Math.abs(l.vy); }
              if (l.img.y > MAP_H - MARGIN)  { l.img.y = MAP_H - MARGIN; l.vy = -Math.abs(l.vy); }

              l.img.setFlipX(l.vx > 0);

              // Run animation: alternate run1/run2 every 0.12s
              l.frameTimer += dt_s;
              if (l.frameTimer >= 0.12) {
                l.frameTimer = 0;
                l.frameCurrent = 1 - l.frameCurrent;
                l.img.setTexture(l.frameCurrent === 0 ? 'lapin_run1' : 'lapin_run2');
              }
            }
          }
        }

        const DISPLAY_GRID = 16; // display tile size
        const SCALE = DISPLAY_GRID / 32; // server uses 32px grid
        const dt = delta / 1000; // seconds
        const CORRECTION = 0.2; // per-frame lerp strength toward server truth

        const activeIds = new Set(Object.keys(players));
        const activePlantIds = new Set(plants.map(plant => String(plant.id)));
        const activeFlightIds = new Set(beeFlights.map(flight => String(flight.id)));
        const activeFireIds = new Set(fireBursts.map(burst => String(burst.id)));

        for (const flight of beeFlights) {
          const flightId = String(flight.id);
          if (!this._flightBees[flightId]) {
            const bee = this.add.graphics();
            bee.fillStyle(0xf5c518, 1);
            bee.fillEllipse(0, 0, 2.8, 2.2);
            bee.fillStyle(0x3a2800, 1);
            bee.fillRect(-0.5, -0.8, 0.5, 1.6);
            bee.fillRect(0.4, -0.8, 0.5, 1.6);
            bee.setDepth(18);
            this._flightBees[flightId] = bee;
          }

          const elapsed = Date.now() - flight.startedAt;
          const ratio = Math.max(0, Math.min(1, elapsed / flight.durationMs));
          const legRatio = ratio <= 0.5 ? ratio * 2 : (1 - ratio) * 2;
          const targetX = flight.targetGridX * DISPLAY_GRID + DISPLAY_GRID / 2;
          const targetY = flight.targetGridY * DISPLAY_GRID + DISPLAY_GRID / 2;
          const x = this._hiveX + (targetX - this._hiveX) * legRatio;
          const yLinear = this._hiveY + (targetY - this._hiveY) * legRatio;
          const arc = Math.sin(legRatio * Math.PI) * -8;
          this._flightBees[flightId].setPosition(x, yLinear + arc);
        }

        for (const flightId of Object.keys(this._flightBees)) {
          if (!activeFlightIds.has(flightId)) {
            this._flightBees[flightId].destroy();
            delete this._flightBees[flightId];
          }
        }

        for (const burst of fireBursts) {
          const burstId = String(burst.id);
          if (!this._fireBursts[burstId]) {
            const gfx = this.add.graphics();
            gfx.setDepth(19);
            this._fireBursts[burstId] = gfx;
          }

          const gfx = this._fireBursts[burstId];
          const elapsed = Date.now() - burst.startedAt;
          const ratio = Math.max(0, Math.min(1, elapsed / burst.durationMs));
          const centerX = burst.targetGridX * DISPLAY_GRID + DISPLAY_GRID / 2;
          const centerY = burst.targetGridY * DISPLAY_GRID + DISPLAY_GRID / 2;
          const radius = 4 + ratio * 8;

          gfx.clear();
          gfx.fillStyle(0xff7a00, 0.55 * (1 - ratio));
          for (let i = 0; i < 12; i++) {
            const a = Math.random() * Math.PI * 2;
            const r = Math.random() * radius;
            gfx.fillCircle(centerX + Math.cos(a) * r, centerY - 1 + Math.sin(a) * r, 1.5);
          }
          gfx.fillStyle(0xffd147, 0.5 * (1 - ratio));
          for (let i = 0; i < 8; i++) {
            const a = Math.random() * Math.PI * 2;
            const r = Math.random() * (radius * 0.6);
            gfx.fillCircle(centerX + Math.cos(a) * r, centerY - 2 + Math.sin(a) * r, 1.2);
          }
        }

        for (const burstId of Object.keys(this._fireBursts)) {
          if (!activeFireIds.has(burstId)) {
            this._fireBursts[burstId].destroy();
            delete this._fireBursts[burstId];
          }
        }

        for (const plant of plants) {
          const plantId = String(plant.id);
          const plantX = plant.gridX * DISPLAY_GRID + DISPLAY_GRID / 2;
          const plantY = plant.gridY * DISPLAY_GRID + DISPLAY_GRID / 2;

          if (!this._plantSprites[plantId]) {
            const textureKey = plant.stage >= 2
              ? 'cacao_plant_blossom'
              : (plant.stage >= 1 ? 'cacao_plant_watered' : 'cacao_plant');
            const plantSprite = this.add.image(plantX, plantY, textureKey);
            plantSprite.setDisplaySize(DISPLAY_GRID, DISPLAY_GRID);
            this._plantSprites[plantId] = plantSprite;
          }

          const textureKey = plant.stage >= 2
            ? 'cacao_plant_blossom'
            : (plant.stage >= 1 ? 'cacao_plant_watered' : 'cacao_plant');
          this._plantSprites[plantId].setTexture(textureKey);
          this._plantSprites[plantId].setPosition(plantX, plantY);
        }

        for (const plantId of Object.keys(this._plantSprites)) {
          if (!activePlantIds.has(plantId)) {
            this._plantSprites[plantId].destroy();
            delete this._plantSprites[plantId];
          }
        }

        for (const p of Object.values(players)) {
          const spriteKey = this._colorToSpriteKey(p.color);
          const colorName = spriteKey.replace('char_', '');

          // Server authoritative position in display pixels
          const sx = p.x * SCALE;
          const sy = p.y * SCALE;

          // Create sprite on first appearance
          if (!this._sprites[p.id]) {
            const spr = this.add.sprite(sx, sy, spriteKey);
            spr.setScale(DISPLAY_GRID / 24);
            spr.play(`idle_${colorName}`);
            this._sprites[p.id] = spr;
            this._local[p.id] = { x: sx, y: sy };

            const bg = this.add.rectangle(sx, sy - 12, DISPLAY_GRID + 2, 5, 0x1f1f33);
            bg.setVisible(false);
            bg.height = 7;
            const fill = this.add.rectangle(sx - DISPLAY_GRID / 2, sy - 12, 0, 5, 0x4a4a8a);
            fill.setOrigin(0, 0.5);
            fill.setVisible(false);
            this._progressBars[p.id] = { bg, fill };
            const lbl = this.add.text(sx, sy - 9, p.name, {
              fontSize: '6px',
              fontFamily: 'Arial, sans-serif',
              color: '#ffffff',
              stroke: '#000000',
              strokeThickness: 1.5,
              resolution: window.devicePixelRatio * 4,
            }).setOrigin(0.5, 1);
            this._labels[p.id] = lbl;
          }

          const spr = this._sprites[p.id];
          const loc = this._local[p.id];

          // Extrapolate using server velocity
          loc.x += (p.vx || 0) * SCALE * dt;
          loc.y += (p.vy || 0) * SCALE * dt;

          // Gently correct toward server position to prevent drift
          loc.x += (sx - loc.x) * CORRECTION;
          loc.y += (sy - loc.y) * CORRECTION;

          const moving = (p.vx !== 0 || p.vy !== 0);

          // Flip horizontally based on horizontal velocity
          if ((p.vx || 0) < 0) spr.setFlipX(true);
          else if ((p.vx || 0) > 0) spr.setFlipX(false);

          const targetAnim = moving ? `run_${colorName}` : `idle_${colorName}`;
          if (spr.anims.currentAnim?.key !== targetAnim) spr.play(targetAnim);

          spr.setPosition(loc.x, loc.y);

          const bar = this._progressBars[p.id];
          if (bar) {
            const progressAction = inProgressByPlayer[p.id] || inProgressByPlayer[String(p.id)];
            if (progressAction && progressAction.status === 'in_progress' && progressAction.startedAt) {
              const elapsed = Date.now() - progressAction.startedAt;
              const ratio = Math.max(0, Math.min(1, elapsed / progressAction.durationMs));
              const barWidth = DISPLAY_GRID + 2;
              bar.bg.setPosition(loc.x, loc.y - 22);
              bar.bg.setVisible(true);
              bar.fill.width = barWidth * ratio;
              bar.fill.setPosition(loc.x - barWidth / 2, loc.y - 22);
              bar.fill.setVisible(true);
            } else {
              bar.bg.setVisible(false);
              bar.fill.setVisible(false);
            }
          }
          if (this._labels[p.id]) this._labels[p.id].setPosition(loc.x, loc.y - 10);
        }

        // Remove sprites for disconnected players
        for (const id of Object.keys(this._sprites)) {
          if (!activeIds.has(id)) {
            this._sprites[id].destroy();
            delete this._sprites[id];
            if (this._labels[id]) { this._labels[id].destroy(); delete this._labels[id]; }
            delete this._local[id];
            if (this._progressBars[id]) {
              this._progressBars[id].bg.destroy();
              this._progressBars[id].fill.destroy();
              delete this._progressBars[id];
            }
          }
        }
      }
    }

    // ── Phaser config ───────────────────────────────────────────────────────
    const config = {
      type: Phaser.AUTO,
      width: window.innerWidth,
      height: window.innerHeight,
      backgroundColor: '#1a1a2e',
      pixelArt: true,
      scene: [GameScene],
      parent: 'game',
      scale: {
        mode: Phaser.Scale.RESIZE,
        autoCenter: Phaser.Scale.CENTER_BOTH,
      },
    };

    const game = new Phaser.Game(config);

    // ── WebSocket ───────────────────────────────────────────────────────────
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    const ws = new WebSocket(`${proto}://${location.host}`);
    const connectQrEl = document.getElementById('connect-qr');
    const connectUrlEl = document.getElementById('connect-url');

    async function loadConnectInfo() {
      try {
        const response = await fetch('/connect-info');
        if (!response.ok) throw new Error('Failed to load connect info');
        const data = await response.json();
        connectQrEl.src = data.qrDataUrl;
        connectUrlEl.textContent = data.connectUrl;
      } catch {
        connectUrlEl.textContent = `${location.origin}/`;
      }
    }

    ws.onopen = () => { statusEl.textContent = 'display connected'; };
    ws.onclose = () => { statusEl.textContent = 'disconnected'; };

    ws.onmessage = (e) => {
      const msg = JSON.parse(e.data);

      if (msg.type === 'state') {
        players = {};
        for (const p of msg.players) players[p.id] = p;
        statusEl.textContent = `players: ${msg.players.length}`;
      }

      if (msg.type === 'action_update') {
        inProgressByPlayer = msg.inProgressByPlayer || {};
        plants = msg.plants || [];
        beeFlights = msg.beeFlights || [];
        fireBursts = msg.fireBursts || [];
      }

      if (msg.type === 'reload_map') {
        console.log('[ws] reload_map received — restarting scene');
        statusEl.textContent = 'reloading map…';
        mapCacheBust = Date.now();
        game.scene.stop('GameScene');
        game.scene.start('GameScene');
      }
    };

    loadConnectInfo();
  </script>
</body>
</html>
